version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: incubator_db
    environment:
      POSTGRES_DB: incubator_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: incubator_backend
    environment:
      NODE_ENV: production
      PORT: 5000
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: incubator_db
      DB_USER: postgres
      DB_PASSWORD: postgres
      JWT_SECRET: your_super_secret_jwt_key_change_this
      MQTT_BROKER: 45.79.206.183
      MQTT_PORT: 1883
      DEVICE_TOPIC_PREFIX: incubator/device1
      FRONTEND_URL: http://localhost:3000
    ports:
      - "5000:5000"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: incubator_frontend
    ports:
      - "3000:80"
    restart: unless-stopped

volumes:
  postgres_data:
